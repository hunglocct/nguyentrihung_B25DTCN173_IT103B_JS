<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <title>Quản Lý Nhân Viên</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header class="header">
      <h1>Quản Lý Nhân Viên</h1>
    </header>

    <section class="form-section">
      <form>
        <div class="form-grid">
          <div class="form-group">
            <label for="fullName">Họ và tên <span class="required">*</span></label>
            <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên" />
          </div>

          <div class="form-group">
            <label for="email">Email <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="vd: ten@gmail.com" />
          </div>

          <div class="form-group">
            <label for="dateOfBirth">Ngày sinh <span class="required">*</span></label>
            <input type="date" id="dateOfBirth" name="dateOfBirth" />
          </div>

          <div class="form-group">
            <label for="position">Chức vụ <span class="required">*</span></label>
            <select id="position" name="position">
              <option value="">-- Chọn chức vụ --</option>
              <option value="Nhân viên">Nhân viên</option>
              <option value="Trưởng nhóm">Trưởng nhóm</option>
              <option value="Trưởng phòng">Trưởng phòng</option>
              <option value="Giám đốc">Giám đốc</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Thêm Nhân Viên</button>
          <button type="reset" class="btn btn-secondary">Nhập Lại</button>
        </div>
      </form>
    </section>

    <section class="table-section">
      <div class="table-header">
        <h2>Danh Sách Nhân Viên</h2>
        <span class="badge">3 nhân viên</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Họ và tên</th>
              <th>Email</th>
              <th>Ngày sinh</th>
              <th>Chức vụ</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Nguyễn Văn A</td>
              <td>a.nguyen@example.com</td>
              <td>01/01/1995</td>
              <td>Nhân viên</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Trần Thị B</td>
              <td>b.tran@example.com</td>
              <td>12/03/1993</td>
              <td>Trưởng nhóm</td>
            </tr>
            <tr>
              <td>3</td>
              <td>Lê Văn C</td>
              <td>c.le@example.com</td>
              <td>20/07/1990</td>
              <td>Trưởng phòng</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <footer class="footer">
      <span>Tổng số nhân viên: 3</span>
    </footer>
  </div>
<script>
const form = document.querySelector("form");
const fullName = document.getElementById("fullName");
const email = document.getElementById("email");
const dateOfBirth = document.getElementById("dateOfBirth");
const position = document.getElementById("position");

const tbody = document.querySelector("tbody");
const badge = document.querySelector(".badge");
const footerCount = document.querySelector(".footer span");

const headerTitle = document.querySelector(".form-section h2") || null;
const submitBtn = document.querySelector(".btn-primary");

let employees = [
  { id: 1, name: "Nguyễn Văn A", email: "a.nguyen@example.com", dob: "1995-01-01", position: "Nhân viên" },
  { id: 2, name: "Trần Thị B", email: "b.tran@example.com", dob: "1993-03-12", position: "Trưởng nhóm" },
  { id: 3, name: "Lê Văn C", email: "c.le@example.com", dob: "1990-07-20", position: "Trưởng phòng" }
];

let editId = null;

function formatDate(date) {
  const d = new Date(date);
  const day = String(d.getDate()).padStart(2,"0");
  const month = String(d.getMonth()+1).padStart(2,"0");
  const year = d.getFullYear();
  return `${day}/${month}/${year}`;
}

function renderTable(){
  tbody.innerHTML="";

  employees.forEach(emp=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>${emp.id}</td>
      <td>${emp.name}</td>
      <td>${emp.email}</td>
      <td>${formatDate(emp.dob)}</td>
      <td>${emp.position}</td>
      <td>
        <div class="actions">
          <button class="btn btn-sm btn-edit" data-id="${emp.id}">Sửa</button>
          <button class="btn btn-sm btn-delete" data-id="${emp.id}">Xóa</button>
        </div>
      </td>
    `;

    tbody.appendChild(tr);
  });

  updateStats();
}

function updateStats(){
  badge.textContent = employees.length + " nhân viên";
  footerCount.textContent = "Tổng số nhân viên: " + employees.length;
}

function validate(){
  if(!fullName.value.trim()){
    alert("Vui lòng nhập họ tên");
    return false;
  }

  if(!email.value.trim()){
    alert("Vui lòng nhập email");
    return false;
  }

  const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if(!emailRegex.test(email.value)){
    alert("Email không hợp lệ");
    return false;
  }

  if(!dateOfBirth.value){
    alert("Vui lòng nhập ngày sinh");
    return false;
  }

  if(!position.value){
    alert("Vui lòng chọn chức vụ");
    return false;
  }

  return true;
}

form.addEventListener("submit",(e)=>{
  e.preventDefault();

  if(!validate()) return;

  const data={
    name: fullName.value.trim(),
    email: email.value.trim(),
    dob: dateOfBirth.value,
    position: position.value
  };

  if(editId===null){
    data.id = employees.length ? Math.max(...employees.map(e=>e.id))+1 : 1;
    employees.push(data);
  }else{
    const index=employees.findIndex(e=>e.id===editId);
    employees[index]={id:editId,...data};
    editId=null;
    submitBtn.textContent="Thêm Nhân Viên";
  }

  form.reset();
  renderTable();
});

tbody.addEventListener("click",(e)=>{

  const id=Number(e.target.dataset.id);

  if(e.target.classList.contains("btn-delete")){
    const emp=employees.find(e=>e.id===id);

    if(confirm("Xóa nhân viên "+emp.name+" ?")){
      employees=employees.filter(e=>e.id!==id);

      if(editId===id){
        form.reset();
        editId=null;
        submitBtn.textContent="Thêm Nhân Viên";
      }

      renderTable();
    }
  }

  if(e.target.classList.contains("btn-edit")){
    const emp=employees.find(e=>e.id===id);

    fullName.value=emp.name;
    email.value=emp.email;
    dateOfBirth.value=emp.dob;
    position.value=emp.position;

    editId=id;
    submitBtn.textContent="Cập Nhật";

    window.scrollTo({top:0,behavior:"smooth"});
  }

});

 
renderTable();
</script>
</body>

</html>
